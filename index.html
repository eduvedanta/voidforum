<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VOID</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;}

  :root{
    --accent:#6c63ff;
    --accent-glow:rgba(108,99,255,0.6);
    --font-display:'Orbitron',monospace;
    --font-mono:'Space Mono',monospace;
    --text-secondary:rgba(180,190,220,0.7);
  }

  body{
    overflow:hidden;
    background:#020a18;
    font-family:var(--font-mono);
  }

  /* ── STAR CANVAS ── */
  #stars{
    position:fixed;
    inset:0;
    z-index:0;
  }

  /* ── NEBULA GLOW BG ── */
  .nebula{
    position:fixed;
    inset:0;
    z-index:1;
    background:
      radial-gradient(ellipse 60% 50% at 50% 40%, rgba(30,20,80,0.55) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 60% 60%, rgba(10,30,80,0.3) 0%, transparent 60%);
    pointer-events:none;
  }

  /* ── LANDING WRAPPER ── */
  .landing{
    position:relative;
    z-index:2;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:0;
  }

  /* ── VOID LOGO ── */
  .void-logo{
    display:flex;
    align-items:center;
    gap:0;
    font-family:var(--font-display);
    font-size:clamp(56px,12vw,120px);
    font-weight:900;
    letter-spacing:clamp(8px,2vw,20px);
    color:#ffffff;
    text-shadow:0 0 40px rgba(255,255,255,0.08);
    user-select:none;
    margin-bottom:clamp(28px,5vh,52px);
    line-height:1;
  }

  .void-v, .void-i, .void-d{
    display:inline-block;
  }

  /* ── BLACK HOLE O ── */
  .void-o{
    position:relative;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:clamp(60px,10.5vw,108px);
    height:clamp(60px,10.5vw,108px);
    margin:0 clamp(2px,0.5vw,6px);
  }

  /* outer glow ring */
  .void-o::before{
    content:'';
    position:absolute;
    inset:-6px;
    border-radius:50%;
    background:conic-gradient(
      from 0deg,
      rgba(108,99,255,0) 0%,
      rgba(108,99,255,0.5) 30%,
      rgba(160,140,255,0.9) 50%,
      rgba(108,99,255,0.5) 70%,
      rgba(108,99,255,0) 100%
    );
    animation:spin 6s linear infinite;
  }

  /* middle halo ring */
  .void-o::after{
    content:'';
    position:absolute;
    inset:4px;
    border-radius:50%;
    border:2px solid rgba(180,170,255,0.25);
    box-shadow:
      0 0 18px 4px rgba(108,99,255,0.35),
      inset 0 0 18px 4px rgba(108,99,255,0.25);
  }

  /* black hole core */
  .bh-core{
    position:absolute;
    inset:0;
    border-radius:50%;
    background:radial-gradient(circle at 42% 42%,
      #0a0a18 0%,
      #020510 55%,
      #010208 100%
    );
    overflow:hidden;
  }

  /* accretion disc shimmer */
  .bh-disc{
    position:absolute;
    width:130%;
    height:30%;
    top:35%;
    left:-15%;
    background:linear-gradient(to right,
      transparent 0%,
      rgba(108,99,255,0.12) 25%,
      rgba(180,170,255,0.3) 50%,
      rgba(108,99,255,0.12) 75%,
      transparent 100%
    );
    border-radius:50%;
    transform:rotateX(60deg);
    animation:pulse-disc 3s ease-in-out infinite;
  }

  @keyframes spin{
    to{transform:rotate(360deg);}
  }

  @keyframes pulse-disc{
    0%,100%{opacity:0.5;}
    50%{opacity:1;}
  }

  /* ── BUTTONS ── */
  .hero-buttons{
    display:flex;
    gap:clamp(10px,2vw,18px);
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:clamp(18px,3vh,32px);
  }

  .btn{
    font-family:var(--font-mono);
    font-size:clamp(10px,1.4vw,13px);
    letter-spacing:2px;
    text-transform:uppercase;
    text-decoration:none;
    padding:10px 24px;
    border-radius:0px;
    border:1.5px solid var(--accent);
    background:var(--accent);
    color:#fff;
    cursor:pointer;
    transition:background 0.2s, box-shadow 0.2s, transform 0.15s;
    box-shadow:0 0 14px rgba(108,99,255,0.35);
  }

  .btn:hover{
    background:rgba(108,99,255,0.75);
    box-shadow:0 0 28px rgba(108,99,255,0.7);
    transform:translateY(-2px);
  }

  /* ── TAGLINE ── */
  .tagline{
    font-family:var(--font-mono);
    font-size:clamp(9px,1.2vw,12px);
    letter-spacing:4px;
    color:var(--text-secondary);
    text-transform:uppercase;
    text-align:center;
    opacity:0.8;
  }

  .tagline span{
    color:rgba(220,220,240,0.55);
  }

  /* ── RESPONSIVE ── */
  @media(max-width:480px){
    .btn{font-size:10px;padding:9px 18px;letter-spacing:1.5px;}
    .tagline{letter-spacing:2.5px;}
  }
</style>
</head>
<body>

<!-- Star field -->
<canvas id="stars"></canvas>
<!-- Nebula overlay -->
<div class="nebula"></div>

<div class="landing">

  <!-- VOID logo with black hole O -->
  <div class="void-logo">
    <span class="void-v">V</span>
    <div class="void-o">
      <div class="bh-core">
        <div class="bh-disc"></div>
      </div>
    </div>
    <span class="void-i">I</span>
    <span class="void-d">D</span>
  </div>

  <!-- Buttons -->
  <div class="hero-buttons">
    <a href="login.html" class="btn">Access Terminal</a>
    <a href="login.html" class="btn">Create Identity</a>
  </div>

  <!-- Tagline -->
  <div class="tagline">
    Discuss<span>.</span>&nbsp; Explore<span>.</span>&nbsp; Infinite<span>.</span>
  </div>

</div>

<!-- Star field script -->
<script>
(function(){
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initStars(){
    stars = [];
    const count = Math.floor((W * H) / 3000);
    for(let i = 0; i < count; i++){
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random(),
        speed: Math.random() * 0.003 + 0.001,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function draw(){
    ctx.clearRect(0, 0, W, H);
    const t = Date.now() * 0.001;
    for(const s of stars){
      const alpha = (Math.sin(t * s.speed * 30 + s.phase) * 0.4 + 0.6) * s.a;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,210,255,${alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', ()=>{ resize(); initStars(); });
  resize(); initStars(); draw();
})();
</script>

<!-- Appwrite + Auth -->
<script src="https://cdn.jsdelivr.net/npm/appwrite@16/dist/iife/sdk.min.js"></script>
<script src="js/appwrite.js?v=5"></script>
<script src="js/auth.js?v=5"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const user = await getCurrentUser();
  if(user){ window.location.href = 'forum.html'; }
});
</script>

</body>
</html>
