<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VOID FORUM</title>

  <link rel="stylesheet" href="css/style.css"/>

  <style>

    body{
      overflow:hidden;
      background:
        radial-gradient(circle at top, #1a1a2e 0%, #09090f 60%);
    }

    .landing{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      padding:20px;
    }

    .landing::before{
      content:'';
      position:absolute;
      inset:0;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(108,99,255,0.03) 2px,
          rgba(108,99,255,0.03) 4px
        );
      pointer-events:none;
    }

    .hero{
      text-align:center;
      max-width:800px;
      z-index:2;
    }

    .hero-logo{
      font-family:var(--font-display);
      font-size:72px;
      letter-spacing:10px;
      font-weight:700;
      color:white;
      margin-bottom:12px;
      text-transform:uppercase;
      text-shadow:0 0 30px rgba(108,99,255,0.3);
    }

    .hero-logo span{
      color:var(--accent);
    }

    .hero-sub{
      font-family:var(--font-mono);
      color:var(--text-secondary);
      letter-spacing:4px;
      font-size:12px;
      margin-bottom:30px;
    }

    .hero-text{
      color:var(--text-secondary);
      line-height:1.8;
      max-width:650px;
      margin:0 auto 40px;
      font-size:14px;
    }

    .hero-buttons{
      display:flex;
      gap:16px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .floating{
      position:absolute;
      border:1px solid rgba(108,99,255,0.15);
      border-radius:50%;
      animation:float 12s linear infinite;
    }

    .floating:nth-child(1){
      width:300px;
      height:300px;
      top:-100px;
      left:-100px;
    }

    .floating:nth-child(2){
      width:200px;
      height:200px;
      bottom:-50px;
      right:10%;
      animation-duration:18s;
    }

    .floating:nth-child(3){
      width:120px;
      height:120px;
      top:20%;
      right:20%;
      animation-duration:10s;
    }

    @keyframes float{
      0%{
        transform:rotate(0deg);
      }
      100%{
        transform:rotate(360deg);
      }
    }

    @media(max-width:700px){

      .hero-logo{
        font-size:42px;
        letter-spacing:5px;
      }

      .hero-text{
        font-size:13px;
      }

    }

  </style>

</head>
<body>

  <div class="landing">

    <div class="floating"></div>
    <div class="floating"></div>
    <div class="floating"></div>

    <div class="hero">

      <div class="hero-logo">
        VOID <span>FORUM</span>
      </div>

      <div class="hero-sub">
        // ENCRYPTED DISCUSSION NETWORK //
      </div>

      <div class="hero-text">
        A hidden transmission board for anonymous minds, strange ideas,
        underground discussions, and classified conversations.
        Access is restricted to registered members only.
      </div>

      <div class="hero-buttons">

        <a href="login.html" class="btn btn-primary">
          Access Terminal
        </a>

        <a href="login.html" class="btn">
          Create Identity
        </a>

      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@16/dist/iife/sdk.min.js"></script>
  <script src="js/appwrite.js?v=5"></script>
  <script src="js/auth.js?v=5"></script>

  <script>

    // Auto redirect logged-in users to forum
    document.addEventListener('DOMContentLoaded', async () => {

      const user = await getCurrentUser();

      if(user){
        window.location.href = 'forum.html';
      }

    });

  </script>

</body>
</html>
