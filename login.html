<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Login — VOID
  </title>

  <link
    rel="stylesheet"
    href="css/style.css"
  />

</head>

<body class="auth-page">

  <!-- NAVBAR -->
  <nav class="navbar">

    <a
      href="index.html"
      class="navbar-logo"
    >
      VOID<span class="cursor">_</span>
    </a>

    <div
      class="navbar-right"
      id="nav-right"
    ></div>

  </nav>

  <!-- AUTH CONTAINER -->
  <div class="auth-container">

    <div class="auth-box">

      <!-- TABS -->
      <div class="auth-tabs">

        <button
          class="auth-tab active"
          onclick="switchTab('login')"
        >
          Login
        </button>

        <button
          class="auth-tab"
          onclick="switchTab('signup')"
        >
          Sign Up
        </button>

      </div>

      <!-- LOGIN -->
      <div
        id="login-form"
        class="auth-form active"
      >

        <h2>
          Access Terminal
        </h2>

        <div
          id="login-message"
          class="message hidden"
        ></div>

        <div class="form-group">

          <label>
            Email Address
          </label>

          <input
            type="email"
            id="login-email"
            placeholder="your@email.com"
          />

        </div>

        <div class="form-group">

          <label>
            Password
          </label>

          <input
            type="password"
            id="login-password"
            placeholder="••••••••"
          />

        </div>

        <button
          class="btn btn-primary"
          style="width:100%;"
          onclick="handleLogin()"
        >
          Login →
        </button>

      </div>

      <!-- SIGNUP -->
      <div
        id="signup-form"
        class="auth-form"
      >

        <h2>
          Create Account
        </h2>

        <div
          id="signup-message"
          class="message hidden"
        ></div>

        <div class="form-group">

          <label>
            Display Name
          </label>

          <input
            type="text"
            id="signup-name"
            placeholder="YourName"
          />

        </div>

        <div class="form-group">

          <label>
            Email Address
          </label>

          <input
            type="email"
            id="signup-email"
            placeholder="your@email.com"
          />

        </div>

        <div class="form-group">

          <label>
            Password
          </label>

          <input
            type="password"
            id="signup-password"
            placeholder="Minimum 8 characters"
          />

        </div>

        <button
          class="btn btn-primary"
          style="width:100%;"
          onclick="handleSignup()"
        >
          Create Account →
        </button>

      </div>

    </div>

  </div>

  <!-- FOOTER -->
  <footer>

    VOID FORUM // CYBER NETWORK ACTIVE

  </footer>

  <!-- APPWRITE SDK -->
  <script src="https://cdn.jsdelivr.net/npm/appwrite@16/dist/iife/sdk.min.js"></script>

  <!-- IMPORTANT -->
  <script src="js/appwrite.js?v=500"></script>
  <script src="js/auth.js?v=500"></script>

  <!-- LOGIN LOGIC -->
  <script>

    document.addEventListener(
      'DOMContentLoaded',
      async () => {

        const user =
          await getCurrentUser();

        if (user) {

          window.location.href =
            '/forum.html';

          return;
        }

        updateNavbar(null);

      }
    );

    // =====================================
    // SWITCH TAB
    // =====================================

    function switchTab(tab) {

      document
        .getElementById('login-form')
        .classList.toggle(
          'active',
          tab === 'login'
        );

      document
        .getElementById('signup-form')
        .classList.toggle(
          'active',
          tab === 'signup'
        );

      document
        .querySelectorAll('.auth-tab')
        .forEach((btn, i) => {

          btn.classList.toggle(
            'active',
            (
              i === 0 &&
              tab === 'login'
            ) ||
            (
              i === 1 &&
              tab === 'signup'
            )
          );

        });

    }

    // =====================================
    // LOGIN
    // =====================================

    async function handleLogin() {

      const email =
        document
          .getElementById(
            'login-email'
          )
          .value
          .trim();

      const password =
        document
          .getElementById(
            'login-password'
          )
          .value;

      const messageEl =
        document.getElementById(
          'login-message'
        );

      if (!email || !password) {

        showMessage(
          messageEl,
          'error',
          'Fill all fields.'
        );

        return;
      }

      const success =
        await logIn(
          email,
          password
        );

      if (success) {

        showMessage(
          messageEl,
          'success',
          'Login successful!'
        );

        setTimeout(() => {

          window.location.href =
            '/forum.html';

        }, 800);

      } else {

        showMessage(
          messageEl,
          'error',
          'Invalid credentials.'
        );

      }

    }

    // =====================================
    // SIGNUP
    // =====================================

    async function handleSignup() {

      const name =
        document
          .getElementById(
            'signup-name'
          )
          .value
          .trim();

      const email =
        document
          .getElementById(
            'signup-email'
          )
          .value
          .trim();

      const password =
        document
          .getElementById(
            'signup-password'
          )
          .value;

      const messageEl =
        document.getElementById(
          'signup-message'
        );

      if (
        !name ||
        !email ||
        !password
      ) {

        showMessage(
          messageEl,
          'error',
          'Fill all fields.'
        );

        return;
      }

      const success =
        await register(
          name,
          email,
          password
        );

      if (success) {

        showMessage(
          messageEl,
          'success',
          'Account created!'
        );

        setTimeout(() => {

          window.location.href =
            '/forum.html';

        }, 1000);

      } else {

        showMessage(
          messageEl,
          'error',
          'Registration failed.'
        );

      }

    }

    // =====================================
    // MESSAGE
    // =====================================

    function showMessage(
      element,
      type,
      text
    ) {

      element.className =
        `message ${type}`;

      element.textContent =
        text;

    }

  </script>

</body>
</html>
