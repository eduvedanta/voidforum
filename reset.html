async function resetPassword(){

  const params =

      window.location.search
    );

  const userId =
    params.get('userId');

  const secret =
    params.get('secret');

  const password =
    document.getElementById(
      'new-password'
    ).value;

  try{

    await account.updateRecovery(
      userId,
      secret,
      password
    );

    alert(
      'Password updated successfully.'
    );

    window.location.href =
      'login.html';

  }catch(err){

    console.error(err);

    alert(
      err.message ||
      'Password reset failed.'
    );

}
